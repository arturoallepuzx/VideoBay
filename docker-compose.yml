services:

  api:
    build: ./docker/php
    container_name: videobay_api
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - media_data:/var/lib/videobay
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  worker:
    build: ./docker/php
    container_name: videobay_worker
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - media_data:/var/lib/videobay
    env_file:
      - backend/.env
    depends_on:
      - api
    command: php artisan queue:work redis_transcoding --queue=transcoding --tries=1 --timeout=86400

  scheduler:
    build: ./docker/php
    container_name: videobay_scheduler
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - media_data:/var/lib/videobay
    env_file:
      - backend/.env
    depends_on:
      - api
    command: php artisan schedule:work

  frontend:
    build: ./docker/frontend
    container_name: videobay_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    environment:
      CHROME_BIN: /usr/bin/chromium
    command: bash -c "npm install && npm start -- --host 0.0.0.0"

  db:
    image: mysql:8
    container_name: videobay_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: videobay_redis
    volumes:
      - redis_data:/data

  dbgate:
    image: dbgate/dbgate
    container_name: videobay_dbgate
    ports:
      - "127.0.0.1:9051:3000"
    depends_on:
      - db
    environment:
      CONNECTIONS: videobay
      LABEL_videobay: VideoBay MySQL
      SERVER_videobay: db
      USER_videobay: root
      PASSWORD_videobay: ${MYSQL_ROOT_PASSWORD}
      PORT_videobay: "3306"
      DATABASE_videobay: ${DB_DATABASE}
      ENGINE_videobay: mysql@dbgate-plugin-mysql
    volumes:
      - ./docker/dbgate-data:/root/.dbgate

volumes:
  mysql_data:
  redis_data:
  media_data:
